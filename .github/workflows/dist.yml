on:
  push:
  workflow_dispatch:

jobs:
  dist:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - run: |
          mkdir -p dist
          zip -r dist/public.zip public
          pnpm add -D vite vite-plugin-singlefile rolldown terser html-minifier-terser
          pnpm vite build

      - uses: actions/upload-artifact@v7
        with:
          name: app
          path: dist/

      - if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dev
          name: Development Build
          files: dist/**

      - run: |
          git fetch origin
          git show-ref --verify --quiet refs/remotes/origin/dist && git checkout dist || git checkout --orphan dist
          git rm -r --ignore-unmatch . || true
          git checkout main -- public
          cp -r .git/ public/
          cd public/
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m "$COMMIT_MSG" || true
          git push -u --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git dist
        env:
          COMMIT_MSG: "${{ github.event.head_commit.message || 'chore: update' }}"
